name: CI

on:
  push:
    branches: [master, main, feat/typescript]
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests against api.telegram.org (requires TEST_TELEGRAM_TOKEN secret)"
        type: boolean
        default: false

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: tsc --noEmit
        run: npx tsc --noEmit

  unit-node:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24", "26"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: Run unit tests
        run: npm run test:node:unit

  # Windows coverage (replaces the removed AppVeyor build). Kept lean: a
  # min-supported + current-stable Node pair rather than the full matrix.
  unit-node-windows:
    name: Unit tests (Windows / Node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: Run unit tests
        run: npm run test:node:unit

  unit-bun:
    name: Unit tests (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          # Bun 1.2+ ships with node:test compatibility, which our suite uses.
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install
      - name: Run unit tests with Bun
        run: npm run test:bun:unit

  build:
    name: Build (dist)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Verify dist artefacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/telegram.js
          test -f dist/telegram.d.ts

  integration:
    name: Integration tests (api.telegram.org)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: Run integration tests
        env:
          TEST_TELEGRAM_TOKEN: ${{ secrets.TEST_TELEGRAM_TOKEN }}
        run: npm run test:node:integration
